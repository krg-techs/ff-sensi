<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ════ PRIMARY SEO ════ -->
  <title>FF SensMatrix | Free Fire Sensitivity Calculator 0-200</title>
  <meta name="description" content="FF SensMatrix — The world's most advanced Free Fire sensitivity calculator (0-200 scale)." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0C1A2B;
      --bg2: #091422;
      --panel: rgba(12,26,43,0.82);
      --green: #B6FF3B;
      --green-dim: rgba(182,255,59,0.12);
      --green-glow: rgba(182,255,59,0.4);
      --cyan: #3BFFD6;
      --text: #C8E6F0;
      --text-muted: #5a7a92;
      --border: rgba(182,255,59,0.22);
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    body {
      background: var(--bg2);
      color: var(--text);
      font-family: var(--font-body);
      margin: 0; padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background Grid */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(182,255,59,0.07) 0%, transparent 60%),
                  linear-gradient(rgba(182,255,59,0.025) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(182,255,59,0.025) 1px, transparent 1px);
      background-size: auto, 40px 40px, 40px 40px;
      z-index: -1;
    }

    .wrapper { max-width: 860px; margin: 0 auto; padding: 40px 16px; position: relative; z-index: 2; }

    header { text-align: center; margin-bottom: 30px; }
    .logo-chip { display: inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 4px; color: var(--green); border: 1px solid var(--border); padding: 4px 14px; margin-bottom: 10px; }
    h1 { font-family: var(--font-display); font-size: clamp(24px, 6vw, 42px); margin: 0; color: #fff; text-transform: uppercase; }
    h1 span { color: var(--green); }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
      margin-top: 20px;
      position: relative;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media(max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 11px; font-family: var(--font-mono); color: var(--green); text-transform: uppercase; }
    
    input, select {
      background: #050a12; border: 1px solid var(--border); border-radius: 6px;
      color: #fff; padding: 12px; font-family: var(--font-body); outline: none;
    }
    input:focus { border-color: var(--green); }

    .btn-calc {
      width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 8px;
      color: #000; font-family: var(--font-display); font-weight: 900; font-size: 14px;
      cursor: pointer; margin-top: 20px; letter-spacing: 2px;
    }

    /* Results Section */
    #results { display: none; margin-top: 30px; }
    .sens-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
    .sens-tile { 
        background: rgba(182,255,59,0.05); border: 1px solid var(--border); 
        padding: 15px; border-radius: 8px; text-align: center;
    }
    .sens-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
    .sens-value { font-family: var(--font-display); font-size: 32px; color: var(--green); font-weight: 900; }

    #loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(9,20,34,0.9);
      z-index: 100; flex-direction: column; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div style="width: 50px; height: 50px; border: 3px solid var(--green); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="color: var(--green); font-family: var(--font-mono); margin-top: 15px;">ANALYZING DEVICE...</p>
  </div>

  <div class="wrapper">
    <header>
      <div class="logo-chip">SYSTEM v4.0</div>
      <h1>FF <span>SensMatrix</span></h1>
      <p style="color: var(--text-muted)">0-200 Scale Headshot Optimizer</p>
    </header>

    <div class="card" id="input-card">
      <div class="form-grid">
        <div class="form-group">
          <label>Device Brand</label>
          <input type="text" id="brand" placeholder="e.g. Samsung, iPhone">
        </div>
        <div class="form-group">
          <label>Device Model</label>
          <input type="text" id="model" placeholder="e.g. S23, iPhone 15">
        </div>
        <div class="form-group">
          <label>Device RAM (GB)</label>
          <select id="ram">
            <option value="2">2 GB or less</option>
            <option value="4">4 GB</option>
            <option value="6">6 GB</option>
            <option value="8" selected>8 GB</option>
            <option value="12">12 GB+</option>
          </select>
        </div>
        <div class="form-group">
          <label>DPI Setting</label>
          <input type="number" id="dpi" value="411">
        </div>
      </div>
      <button class="btn-calc" onclick="calculateSens()">GENERATE SENSITIVITY</button>
    </div>

    <!-- Results Display -->
    <div id="results" class="card">
      <h2 style="font-family: var(--font-display); text-align: center; color: var(--green); font-size: 18px;">OPTIMIZED SETTINGS</h2>
      <div class="sens-grid" id="sens-container">
        <!-- Results injected here by JS -->
      </div>
      <button class="btn-calc" style="background: transparent; color: var(--green); border: 1px solid var(--green);" onclick="location.reload()">RECALCULATE</button>
    </div>
  </div>

  <script>
    function calculateSens() {
      const ram = parseInt(document.getElementById('ram').value);
      const dpi = parseInt(document.getElementById('dpi').value);
      
      // Show loading
      document.getElementById('loading-overlay').style.display = 'flex';

      setTimeout(() => {
        // Simple Logic: Higher RAM/DPI usually needs slightly lower "General" to avoid shaking
        // Low RAM needs higher General to assist drag.
        let base = 120; 
        if (ram <= 4) base += 20;
        if (dpi > 500) base -= 15;

        const results = {
          "General": Math.min(200, base + Math.floor(Math.random() * 10)),
          "Red Dot": Math.min(200, base - 10),
          "2x Scope": Math.min(200, base - 15),
          "4x Scope": Math.min(200, base - 20),
          "Sniper": 50,
          "Fire Button": Math.floor(45 + (Math.random() * 15))
        };

        const container = document.getElementById('sens-container');
        container.innerHTML = '';

        for (const [key, val] of Object.entries(results)) {
          container.innerHTML += `
            <div class="sens-tile">
              <div class="sens-name">${key}</div>
              <div class="sens-value">${val}${key === 'Fire Button' ? '%' : ''}</div>
            </div>
          `;
        }

        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('input-card').style.display = 'none';
        document.getElementById('results').style.display = 'block';
      }, 1500);
    }
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

</body>
</html>
