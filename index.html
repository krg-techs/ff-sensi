  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0C1A2B;
      --bg2: #091422;
      --panel: rgba(12, 26, 43, 0.75);
      --green: #B6FF3B;
      --green-dim: rgba(182, 255, 59, 0.15);
      --green-glow: rgba(182, 255, 59, 0.4);
      --text: #C8E6F0;
      --text-muted: #5a7a92;
      --border: rgba(182, 255, 59, 0.2);
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg2); color: var(--text); font-family: var(--font-body); overflow-x: hidden; min-height: 100vh; }

    /* Scanning line & Grid */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(182,255,59,0.07) 0%, transparent 60%),
                  linear-gradient(rgba(182,255,59,0.03) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(182,255,59,0.03) 1px, transparent 1px);
      background-size: auto, 40px 40px, 40px 40px; z-index: 0;
    }

    .wrapper { position: relative; z-index: 2; max-width: 860px; margin: 0 auto; padding: 24px 16px; }

    header { text-align: center; padding: 48px 0 36px; }
    .logo-chip { font-family: var(--font-mono); font-size: 11px; color: var(--green); border: 1px solid var(--border); padding: 4px 14px; display: inline-block; margin-bottom: 16px; }
    h1 { font-family: var(--font-display); font-size: clamp(26px, 7vw, 52px); color: #fff; text-shadow: 0 0 30px var(--green-glow); }
    h1 span { color: var(--green); }

    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 32px; backdrop-filter: blur(18px); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 20px; }
    @media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }

    label { font-family: var(--font-mono); font-size: 11px; color: var(--green); text-transform: uppercase; display: block; margin-bottom: 8px; }
    input, select { background: #0c1a2b; border: 1px solid var(--border); color: #fff; padding: 12px; width: 100%; border-radius: 6px; outline: none; }
    input:focus { border-color: var(--green); }

    .btn-calc {
      margin-top: 28px; width: 100%; padding: 16px; background: transparent; border: 2px solid var(--green);
      color: var(--green); font-family: var(--font-display); font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .btn-calc:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 20px var(--green-glow); }

    .results { margin-top: 32px; display: none; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sens-box { background: rgba(182, 255, 59, 0.05); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
    .sens-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
    .sens-value { font-family: var(--font-display); font-size: 24px; color: var(--green); }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo-chip">MATRIX CORE ACTIVE</div>
      <h1>FF <span>SensMatrix</span></h1>
    </header>

    <main class="card">
      <div class="form-grid">
        <div style="grid-column: 1 / -1">
          <label>Phone Model</label>
          <input type="text" id="model" placeholder="e.g. iPhone 15, ROG Phone 8">
        </div>
        <div>
          <label>DPI</label>
          <input type="number" id="dpi" value="411">
        </div>
        <div>
          <label>RAM (GB)</label>
          <select id="ram">
            <option value="4">4GB - 6GB</option>
            <option value="8">8GB - 12GB</option>
            <option value="16">16GB+</option>
          </select>
        </div>
      </div>
      <button class="btn-calc" onclick="runMatrix()">INITIALIZE CALCULATION</button>

      <div id="results" class="results">
        <div class="sens-box"><div class="sens-label">General</div><div class="sens-value" id="s-gen">0</div></div>
        <div class="sens-box"><div class="sens-label">Red Dot</div><div class="sens-value" id="s-red">0</div></div>
        <div class="sens-box"><div class="sens-label">2x Scope</div><div class="sens-value" id="s-2x">0</div></div>
        <div class="sens-box"><div class="sens-label">4x Scope</div><div class="sens-value" id="s-4x">0</div></div>
      </div>
    </main>
  </div>

  <script>
    function runMatrix() {
      const dpi = parseInt(document.getElementById('dpi').value);
      const ram = parseInt(document.getElementById('ram').value);
      
      // Basic Logic: Lower RAM needs higher sensitivity to overcome touch lag
      let base = 100;
      if (dpi > 500) base -= 10;
      if (ram < 6) base += 20;

      document.getElementById('s-gen').innerText = Math.min(200, base + 25);
      document.getElementById('s-red').innerText = Math.min(200, base + 15);
      document.getElementById('s-2x').innerText = Math.min(200, base + 5);
      document.getElementById('s-4x').innerText = Math.min(200, base - 5);
      
      document.getElementById('results').style.display = 'grid';
    }
  </script>
</body>
</html>
